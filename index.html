<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار الجواز الرقمي | SHΔDØW CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --iq-blue: #003366;
            --iq-gold: #c5a059;
            --paper: #f9f7f2;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        /* منطقة التحكم */
        .setup-panel {
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            margin-bottom: 30px;
            border: 1px solid var(--iq-gold);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #333;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--iq-gold);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #e6bc6a; }

        /* تصميم الجواز الاستعراضي */
        #passport-result {
            width: 650px;
            height: 420px;
            background-color: var(--paper);
            color: #111;
            border-radius: 5px;
            position: relative;
            display: none; /* يظهر بعد الضغط على الزر */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #ccc;
        }

        /* نقش أمني خلفي */
        .security-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, #eee 0px, #eee 2px, transparent 2px, transparent 10px);
            opacity: 0.4;
            z-index: 1;
        }

        .passport-inner {
            position: relative;
            z-index: 2;
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--iq-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 { font-size: 18px; margin: 0; color: var(--iq-blue); }

        .body-content {
            display: flex;
            gap: 25px;
        }

        .photo-area {
            width: 160px;
            height: 210px;
            border: 1px solid #999;
            background: #ddd;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
        }

        .data-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .label { font-size: 11px; color: #666; margin: 0; }
        .val { font-size: 16px; font-weight: bold; margin: 2px 0; }

        .mrz {
            margin-top: auto;
            font-family: 'Courier New', monospace;
            font-size: 19px;
            letter-spacing: 6px;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="setup-panel">
        <h2 style="text-align:center; color:var(--iq-gold);">توليد نموذج الجواز الإلكتروني</h2>
        <input type="text" id="nameIn" placeholder="الاسم الكامل (ميرا النوري)">
        <input type="text" id="nameEnIn" placeholder="Full Name (MIRA AL NOURI)">
        <input type="text" id="birthIn" placeholder="تاريخ الميلاد (1992)">
        <input type="file" id="imgIn" accept="image/*">
        <button onclick="generate()">بناء الجواز الآن 🔥</button>
        <button id="saveBtn" style="margin-top:10px; background:#27ae60; color:white; display:none;" onclick="save()">تحميل الصورة (PNG)</button>
    </div>

    <div id="passport-result">
        <div class="security-bg"></div>
        <div class="passport-inner">
            <div class="header">
                <div>جمهورية العراق<br>REPUBLIC OF IRAQ</div>
                <div style="text-align:left;">جواز سفر<br>PASSPORT</div>
            </div>

            <div class="body-content">
                <div class="photo-area">
                    <img id="resImg" src="">
                </div>
                <div class="data-grid">
                    <div style="grid-column: span 2;">
                        <p class="label">الاسم الكامل / Full Name</p>
                        <p class="val" id="resNameAr"></p>
                        <p class="val" id="resNameEn"></p>
                    </div>
                    <div>
                        <p class="label">تاريخ الميلاد / Date of Birth</p>
                        <p class="val" id="resBirth"></p>
                    </div>
                    <div>
                        <p class="label">الجنس / Sex</p>
                        <p class="val">F</p>
                    </div>
                    <div>
                        <p class="label">رقم الجواز / Passport No.</p>
                        <p class="val">A12345678</p>
                    </div>
                </div>
            </div>

            <div class="mrz" id="resMRZ"></div>
        </div>
    </div>

    <script>
        function generate() {
            const nameAr = document.getElementById('nameIn').value;
            const nameEn = document.getElementById('nameEnIn').value;
            const birth = document.getElementById('birthIn').value;
            const file = document.getElementById('imgIn').files[0];

            if(!nameAr || !nameEn || !file) return alert("أكمل البيانات أولاً!");

            document.getElementById('resNameAr').innerText = nameAr;
            document.getElementById('resNameEn').innerText = nameEn.toUpperCase();
            document.getElementById('resBirth').innerText = birth;

            // توليد سطر MRZ وهمي
            const mrzName = nameEn.toUpperCase().replace(/ /g, "<");
            document.getElementById('resMRZ').innerText = `P<IRQ${mrzName}<<<<<<<<<<<<<<<<<<`;

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('resImg').src = e.target.result;
                document.getElementById('passport-result').style.display = 'block';
                document.getElementById('saveBtn').style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        function save() {
            html2canvas(document.getElementById('passport-result')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Iraq_Passport_Mockup.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
