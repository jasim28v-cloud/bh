<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΔDØW CORE - Digital Passport System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #d4af37; --blue: #1a2a6c; --dark: #0f0f0f; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* لوحة التحكم */
        .control-panel { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 450px; border: 1px solid #333; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .gen-btn { background: var(--gold); color: black; }
        .dl-btn { background: #27ae60; color: white; display: none; }

        /* تصميم الجواز */
        #passport-design {
            width: 600px; height: 380px;
            background: #fff; color: #111;
            border-radius: 10px; position: relative;
            display: none; overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid #ccc;
        }

        /* خلفية بنقوش الجواز */
        .passport-bg {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#eee 10%, transparent 10%);
            background-size: 10px 10px; opacity: 0.3; z-index: 1;
        }

        .passport-content { position: relative; z-index: 2; padding: 20px; display: flex; flex-direction: column; height: 100%; }
        
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--blue); padding-bottom: 5px; }
        .header-top h2 { font-size: 18px; color: var(--blue); margin: 0; }

        .main-data { display: flex; gap: 20px; margin-top: 20px; }
        
        .photo-section { width: 160px; height: 210px; border: 1px solid #888; background: #fafafa; position: relative; }
        .photo-section img { width: 100%; height: 100%; object-fit: cover; }
        
        .fields-section { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .field { margin-bottom: 5px; }
        .label { font-size: 10px; color: #777; margin: 0; }
        .value { font-size: 15px; font-weight: bold; color: #000; margin: 0; }

        .mrz-zone {
            margin-top: auto;
            font-family: 'OCR-B', 'Courier New', monospace;
            font-size: 17px; letter-spacing: 5px;
            background: rgba(0,0,0,0.05); padding: 10px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3 style="text-align:center; color:var(--gold);">نظام برمجة الجواز الإلكتروني</h3>
        <input type="text" id="nameAr" placeholder="الاسم الكامل (بالعربية)">
        <input type="text" id="nameEn" placeholder="Full Name (English)">
        <input type="text" id="birthYear" placeholder="سنة الميلاد (مثال: 1992)">
        <input type="file" id="userImg" accept="image/*">
        <button class="gen-btn" onclick="buildPassport()">توليد التصميم 🔥</button>
        <button id="dlBtn" class="dl-btn" onclick="saveAsImage()">حفظ الصورة النهائية ⬇️</button>
    </div>

    <div id="passport-design">
        <div class="passport-bg"></div>
        <div class="passport-content">
            <div class="header-top">
                <div>جمهورية العراق<br>REPUBLIC OF IRAQ</div>
                <div style="text-align:left;">جواز سفر<br>PASSPORT</div>
            </div>

            <div class="main-data">
                <div class="photo-section">
                    <img id="resPhoto" src="">
                </div>
                <div class="fields-section">
                    <div class="field" style="grid-column: span 2;">
                        <p class="label">الاسم الكامل / Full Name</p>
                        <p class="value" id="resNameAr"></p>
                        <p class="value" id="resNameEn" style="text-transform: uppercase;"></p>
                    </div>
                    <div class="field">
                        <p class="label">تاريخ الميلاد / Date of Birth</p>
                        <p class="value" id="resDOB"></p>
                    </div>
                    <div class="field">
                        <p class="label">الجنس / Sex</p>
                        <p class="value">F</p>
                    </div>
                    <div class="field">
                        <p class="label">رقم الجواز / Passport No.</p>
                        <p class="value">A0000000</p>
                    </div>
                </div>
            </div>

            <div class="mrz-zone" id="resMRZ"></div>
        </div>
    </div>

    <script>
        function buildPassport() {
            const nAr = document.getElementById('nameAr').value;
            const nEn = document.getElementById('nameEn').value;
            const bY = document.getElementById('birthYear').value;
            const img = document.getElementById('userImg').files[0];

            if(!nAr || !nEn || !img) return alert("أدخل جميع البيانات!");

            document.getElementById('resNameAr').innerText = nAr;
            document.getElementById('resNameEn').innerText = nEn;
            document.getElementById('resDOB').innerText = bY;
            
            // محاكاة كود MRZ
            const mrzName = nEn.toUpperCase().replace(/ /g, "<");
            document.getElementById('resMRZ').innerHTML = `P<IRQ${mrzName}<<<<<<<<<<<<<<<<<<<<<< <br> A0000000<<0IRQ${bY.substring(2)}<<<<<<<<<<<<<<<<`;

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('resPhoto').src = e.target.result;
                document.getElementById('passport-design').style.display = 'block';
                document.getElementById('dlBtn').style.display = 'block';
            };
            reader.readAsDataURL(img);
        }

        function saveAsImage() {
            const card = document.getElementById('passport-design');
            html2canvas(card, {scale: 2}).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Iraq_Passport_Model.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
